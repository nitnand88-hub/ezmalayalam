<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EZMalayalam</title>

<style>
body {
  font-family: system-ui;
  margin: 0;
  background: #f5f6fa;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
  margin-bottom: 20px;
}

textarea {
  width: 100%;
  height: 80px;
  padding: 10px;
  font-size: 14px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* CLEAN CONTROL PANEL */
.controls {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 15px;
  margin: 20px 0;
  background: white;
  padding: 15px;
  border-radius: 10px;
}

.control-group {
  display: flex;
  flex-direction: column;
  font-size: 12px;
}

.control-group label {
  margin-bottom: 4px;
  font-weight: 600;
}

.preview-container {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.font-block {
  text-align: center;
}

.font-name {
  font-size: 12px;
  margin-bottom: 5px;
  color: #555;
}

.preview-box {
  display: inline-block;
  margin: auto;
}

button {
  margin-top: 8px;
  padding: 5px 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.download-btn {
  background: black;
  color: white;
}

.copy-btn {
  background: #007bff;
  color: white;
  margin-left: 6px;
}

/* MOBILE */
@media (max-width:600px){
  textarea { height: 70px; }
}
</style>
</head>

<body>
<div class="container">

<h1>🇮🇳 EZMalayalam</h1>

<textarea id="inputText" placeholder="Type here..."></textarea>

<div class="controls">

  <div class="control-group">
    <label>Text Color</label>
    <input type="color" id="textColor" value="#ffffff">
  </div>

  <div class="control-group">
    <label>Stroke</label>
    <input type="checkbox" id="strokeToggle">
    <input type="color" id="strokeColor" value="#000000">
  </div>

  <div class="control-group">
    <label>Shadow</label>
    <input type="checkbox" id="shadowToggle" checked>
    <input type="range" id="shadowSize" min="0" max="10" value="3">
  </div>

  <div class="control-group">
    <label>Background</label>
    <input type="checkbox" id="bgToggle" checked>
    <input type="color" id="bgColor" value="#000000">
  </div>

  <div class="control-group">
    <label>Size</label>
    <input type="range" id="fontSize" min="20" max="80" value="40">
  </div>

  <div class="control-group">
    <label>Padding</label>
    <input type="range" id="padding" min="5" max="50" value="20">
  </div>

  <div class="control-group">
    <label>Radius</label>
    <input type="range" id="radius" min="0" max="50" value="15">
  </div>

</div>

<div class="preview-container" id="preview"></div>

</div>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>
const fonts = [
  "Anek Malayalam",
  "Manjari",
  "Gayathri",
  "Chilanka",
  "Baloo Chettan 2"
];

const input = document.getElementById("inputText");
const preview = document.getElementById("preview");

document.querySelectorAll("input, textarea").forEach(el=>{
  el.addEventListener("input", render);
});

function render(){
  preview.innerHTML = "";

  const text = input.value || "Type something";

  const color = document.getElementById("textColor").value;
  const strokeColor = document.getElementById("strokeColor").value;
  const strokeToggle = document.getElementById("strokeToggle").checked;

  const shadowToggle = document.getElementById("shadowToggle").checked;
  const shadow = document.getElementById("shadowSize").value;

  const bgToggle = document.getElementById("bgToggle").checked;
  const bgColor = document.getElementById("bgColor").value;

  const size = document.getElementById("fontSize").value;
  const padding = document.getElementById("padding").value;
  const radius = document.getElementById("radius").value;

  fonts.forEach(font=>{
    const block = document.createElement("div");
    block.className = "font-block";

    block.innerHTML = `
      <div class="font-name">${font}</div>

      <div class="preview-box" id="box-${font}" style="
        font-family:'${font}';
        color:${color};
        font-size:${size}px;
        padding:${padding}px;
        border-radius:${radius}px;
        background:${bgToggle?bgColor:"transparent"};
        -webkit-text-stroke:${strokeToggle?2:0}px ${strokeColor};
        text-shadow:${shadowToggle?`${shadow}px ${shadow}px ${shadow}px rgba(0,0,0,0.5)`:"none"};
        text-align:center;
        white-space:pre-wrap;
        width:fit-content;
        max-width:90%;
        margin:auto;
        word-break:normal;
        overflow-wrap:break-word;
        box-sizing:border-box;
        line-height:1.3;
      ">
        ${text}
      </div>

      <div>
        <button class="download-btn" onclick="download('${font}')">Download</button>
        <button class="copy-btn" onclick="copyText()">Copy Text</button>
      </div>
    `;

    preview.appendChild(block);
  });
}

function copyText(){
  navigator.clipboard.writeText(input.value);
}

function download(font){
  const box = document.getElementById("box-"+font);

  html2canvas(box).then(canvas=>{
    const link = document.createElement("a");
    link.download = "malayalam.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}

render();
</script>

</body>
</html>
