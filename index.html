<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EZMalayalam</title>

<link href="https://fonts.googleapis.com/css2?family=Manjari&family=Gayathri&family=Chilanka&family=Baloo+Chettan+2&display=swap" rel="stylesheet">

<style>
body {
  font-family: system-ui;
  background:#f4f6fb;
  margin:0;
}

.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}

h2 {
  text-align:center;
}

textarea {
  width:100%;
  height:100px;
  border-radius:10px;
  padding:12px;
  border:1px solid #ccc;
  font-size:16px;
}

.controls {
  display:flex;
  flex-wrap:wrap;
  gap:15px;
  background:#fff;
  padding:15px;
  margin-top:15px;
  border-radius:12px;
  justify-content:center;
}

.preview-container {
  margin-top:20px;
  display:flex;
  flex-direction:column;
  gap:30px;
}

.preview-box {
  margin:auto;
  white-space:pre-wrap;
  text-align:center;
}

.btns {
  text-align:center;
  margin-top:8px;
}

button {
  padding:6px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.download { background:black;color:white; }
.copy { background:#007bff;color:white;margin-left:6px; }

/* 🔥 REMOVE GOOGLE UI COMPLETELY */
.goog-te-banner-frame,
.goog-te-menu-frame,
.goog-te-balloon-frame,
.goog-te-gadget,
.goog-te-combo {
  display:none !important;
}

body { top:0 !important; }

@media (max-width:600px){
  textarea { font-size:18px; }
}
</style>
</head>

<body>

<div class="container">

<h2>EZMalayalam</h2>

<textarea id="text" placeholder="Type Manglish..."></textarea>

<div class="controls">
<label>Text <input type="color" id="textColor" value="#ffffff"></label>
<label>Background <input type="checkbox" id="bgToggle" checked></label>
<input type="color" id="bgColor" value="#000000">
<label>Size <input type="range" id="size" min="20" max="80" value="40"></label>
<label>Padding <input type="range" id="padding" min="10" max="60" value="20"></label>
</div>

<div id="preview" class="preview-container"></div>

</div>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<!-- 🔥 GOOGLE TRANSLITERATION (REAL ONE) -->
<script src="https://www.google.com/jsapi"></script>
<script>
google.load("elements", "1", {
  packages: "transliteration"
});

function onLoad() {
  var options = {
    sourceLanguage: 'en',
    destinationLanguage: ['ml'],
    shortcutKey: 'ctrl+g',
    transliterationEnabled: true
  };

  var control = new google.elements.transliteration.TransliterationControl(options);
  control.makeTransliteratable(['text']);
}

google.setOnLoadCallback(onLoad);
</script>

<script>
const fonts = ["Manjari","Gayathri","Chilanka","Baloo Chettan 2"];
const preview = document.getElementById("preview");

document.querySelectorAll("input, textarea").forEach(el=>{
  el.addEventListener("input", render);
});

function render(){
  preview.innerHTML="";

  const text = document.getElementById("text").value || "Type something";

  const color = document.getElementById("textColor").value;
  const bgOn = document.getElementById("bgToggle").checked;
  const bgColor = document.getElementById("bgColor").value;
  const size = document.getElementById("size").value;
  const padding = document.getElementById("padding").value;

  fonts.forEach(font=>{
    const block = document.createElement("div");

    block.innerHTML = `
      <div style="text-align:center; font-size:12px; margin-bottom:5px">${font}</div>

      <div class="preview-box"
      id="box-${font}"
      style="
        font-family:'${font}';
        color:${color};
        font-size:${size}px;
        padding:${padding}px;
        border-radius:15px;
        background:${bgOn?bgColor:'transparent'};
      ">
${text}
      </div>

      <div class="btns">
        <button class="download" onclick="download('${font}')">Download</button>
        <button class="copy" onclick="copyText()">Copy</button>
      </div>
    `;

    preview.appendChild(block);
  });
}

function copyText(){
  navigator.clipboard.writeText(document.getElementById("text").value);
}

function download(font){
  html2canvas(document.getElementById("box-"+font)).then(canvas=>{
    const link=document.createElement("a");
    link.download="malayalam.png";
    link.href=canvas.toDataURL();
    link.click();
  });
}

render();
</script>

</body>
</html>
