<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EZMalayalam Pro Editor</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
padding:20px;
}

/* TEXT INPUT */
textarea{
width:90%;
height:90px;
font-size:18px;
margin-bottom:15px;
padding:10px;
}

/* CONTROLS */
.controls{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
background:#fff;
padding:15px;
border-radius:12px;
margin-bottom:20px;
}

.controls label{
font-size:13px;
display:flex;
flex-direction:column;
align-items:center;
}

/* PREVIEW LIST */
.preview-list{
display:flex;
flex-direction:column;
gap:20px;
align-items:center;
}

/* CARD */
.card{
display:inline-block;
}

/* TEXT BOX */
.subtitle{
display:inline-block;
white-space:pre-wrap;
text-align:center;
}

button{
margin-top:5px;
padding:6px 12px;
cursor:pointer;
}

</style>
</head>

<body>

<h2>🎬 EZMalayalam Subtitle Editor</h2>

<textarea id="input" placeholder="Type Manglish..."></textarea>

<div class="controls">

<label>Text Color
<input type="color" id="color" value="#ffffff">
</label>

<label>Stroke ON
<input type="checkbox" id="strokeToggle" checked>
</label>

<label>Stroke Size
<input type="range" id="stroke" min="0" max="6" value="2">
</label>

<label>Stroke Color
<input type="color" id="strokeColor" value="#000000">
</label>

<label>BG ON
<input type="checkbox" id="bgToggle" checked>
</label>

<label>BG Color
<input type="color" id="bgColor" value="#000000">
</label>

<label>Padding
<input type="range" id="padding" min="0" max="40" value="15">
</label>

<label>Radius
<input type="range" id="radius" min="0" max="40" value="15">
</label>

<label>Size
<input type="range" id="size" min="40" max="120" value="70">
</label>

</div>

<div class="preview-list" id="previewList"></div>

<script>

let lastText="";

/* FONTS */
const fonts=[
"Manjari",
"Gayathri",
"Chilanka",
"Baloo",
"NotoSans",
"NotoSerif",
"Anek",
"Arima"
];

/* INPUT */
document.getElementById("input").addEventListener("input", convert);

/* CONVERT */
async function convert(){

let val=document.getElementById("input").value;

if(!val){
lastText="";
render();
return;
}

const res=await fetch(`https://inputtools.google.com/request?text=${val}&itc=ml-t-i0-und&num=1`);
const data=await res.json();

lastText=data[1][0][1][0];

render();
}

/* RENDER MULTIPLE */
function render(){

let container=document.getElementById("previewList");
container.innerHTML="";

if(!lastText) return;

/* KEEP LINE BREAK */
let text=lastText.split("\n").join("<br>");

let color=document.getElementById("color").value;
let strokeToggle=document.getElementById("strokeToggle").checked;
let stroke=document.getElementById("stroke").value;
let strokeColor=document.getElementById("strokeColor").value;

let bgToggle=document.getElementById("bgToggle").checked;
let bgColor=document.getElementById("bgColor").value;

let padding=document.getElementById("padding").value;
let radius=document.getElementById("radius").value;
let size=document.getElementById("size").value;

/* LOOP FONTS */
fonts.forEach(font=>{

let card=document.createElement("div");
card.className="card";

let subtitle=document.createElement("div");

subtitle.className="subtitle";
subtitle.innerHTML=text;

subtitle.style.fontFamily=font;
subtitle.style.fontSize=size+"px";
subtitle.style.color=color;

subtitle.style.padding=padding+"px";
subtitle.style.borderRadius=radius+"px";

subtitle.style.display="inline-block";
subtitle.style.margin="0 auto";

/* FIX ALIGN CENTER */
subtitle.style.textAlign="center";

/* STROKE */
if(strokeToggle){
subtitle.style.webkitTextStroke=stroke+"px "+strokeColor;
}else{
subtitle.style.webkitTextStroke="0px transparent";
}

/* BACKGROUND */
if(bgToggle){
subtitle.style.background=bgColor;
}else{
subtitle.style.background="transparent";
}

/* BUTTON */
let btn=document.createElement("button");
btn.innerText="Download";

btn.onclick=()=>{
html2canvas(subtitle,{
backgroundColor:null,
scale:3
}).then(canvas=>{
let link=document.createElement("a");
link.download=font+".png";
link.href=canvas.toDataURL();
link.click();
});
};

card.appendChild(subtitle);
card.appendChild(document.createElement("br"));
card.appendChild(btn);

container.appendChild(card);

});

}

/* LIVE */
document.querySelectorAll("input").forEach(el=>{
el.addEventListener("input",render);
});

</script>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

</body>
</html>
