<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EZMalayalam</title>

<link href="https://fonts.googleapis.com/css2?family=Manjari&family=Gayathri&family=Chilanka&family=Baloo+Chettan+2&display=swap" rel="stylesheet">

<style>
body {
  font-family: system-ui;
  background:#f4f6fb;
  margin:0;
}

.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}

h2 {
  text-align:center;
}

textarea {
  width:100%;
  height:90px;
  border-radius:10px;
  padding:12px;
  border:1px solid #ccc;
}

.controls {
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(130px,1fr));
  gap:12px;
  background:#fff;
  padding:15px;
  margin-top:15px;
  border-radius:12px;
}

.preview-container {
  margin-top:20px;
  display:flex;
  flex-direction:column;
  gap:25px;
}

.preview-box {
  margin:auto;
  white-space:pre-wrap;
  max-width:90%;
}

.btns {
  text-align:center;
  margin-top:8px;
}

button {
  padding:6px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.download { background:black;color:white; }
.copy { background:#007bff;color:white;margin-left:6px; }

/* 🔥 HIDE GOOGLE "IN" UI */
.goog-te-banner-frame,
.goog-te-menu-frame,
.goog-te-balloon-frame,
.goog-te-gadget {
  display:none !important;
}
</style>
</head>

<body>

<div class="container">

<h2>EZMalayalam</h2>

<textarea id="text" placeholder="Type Manglish..."></textarea>

<div class="controls">
<input type="color" id="textColor" value="#ffffff">
<input type="checkbox" id="bgToggle" checked> Background
<input type="color" id="bgColor" value="#000000">
<input type="range" id="size" min="20" max="80" value="40">
<input type="range" id="padding" min="10" max="60" value="20">
</div>

<div id="preview" class="preview-container"></div>

</div>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>
/* 🔥 CUSTOM SIMPLE TRANSLITERATION (STABLE) */

function manglishToMalayalam(text) {
  // basic working mapping (extend later)
  return text
    .replace(/njan/g,"ഞാൻ")
    .replace(/innu/g,"ഇന്ന്")
    .replace(/varilla/g,"വരില്ല")
    .replace(/hello/g,"ഹലോ");
}

/* FONTS */
const fonts = ["Manjari","Gayathri","Chilanka","Baloo Chettan 2"];
const preview = document.getElementById("preview");

/* LISTENER */
document.querySelectorAll("input, textarea").forEach(el=>{
  el.addEventListener("input", render);
});

/* RENDER */
function render(){

  preview.innerHTML="";

  let text = document.getElementById("text").value || "Type something";

  // 🔥 apply transliteration
  text = manglishToMalayalam(text);

  const color = document.getElementById("textColor").value;
  const bgOn = document.getElementById("bgToggle").checked;
  const bgColor = document.getElementById("bgColor").value;
  const size = document.getElementById("size").value;
  const padding = document.getElementById("padding").value;

  fonts.forEach(font=>{

    const block = document.createElement("div");

    block.innerHTML = `
      <div class="preview-box"
      id="box-${font}"
      style="
        font-family:'${font}';
        color:${color};
        font-size:${size}px;
        padding:${padding}px;
        border-radius:15px;
        background:${bgOn?bgColor:'transparent'};
      ">
${text}
      </div>

      <div class="btns">
        <button class="download" onclick="download('${font}')">Download</button>
        <button class="copy" onclick="copyText()">Copy</button>
      </div>
    `;

    preview.appendChild(block);
  });
}

/* COPY */
function copyText(){
  navigator.clipboard.writeText(document.getElementById("text").value);
}

/* DOWNLOAD */
function download(font){
  html2canvas(document.getElementById("box-"+font)).then(canvas=>{
    const link=document.createElement("a");
    link.download="malayalam.png";
    link.href=canvas.toDataURL();
    link.click();
  });
}

/* INIT */
render();
</script>

</body>
</html>
