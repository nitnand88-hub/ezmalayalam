<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EZMalayalam</title>

<!-- Malayalam Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Manjari&family=Gayathri&family=Chilanka&family=Baloo+Chettan+2&display=swap" rel="stylesheet">

<!-- Google Transliteration -->
<script src="https://www.google.com/jsapi"></script>

<style>
body {
  font-family: system-ui;
  background:#f4f6fb;
  margin:0;
}

.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}

h2 {
  text-align:center;
}

/* INPUT */
textarea {
  width:100%;
  height:90px;
  border-radius:10px;
  padding:12px;
  border:1px solid #ccc;
  font-size:14px;
}

/* CONTROLS */
.controls {
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(130px,1fr));
  gap:12px;
  background:#fff;
  padding:15px;
  margin-top:15px;
  border-radius:12px;
}

.controls label {
  font-size:12px;
  font-weight:600;
}

/* PREVIEW */
.preview-container {
  margin-top:20px;
  display:flex;
  flex-direction:column;
  gap:25px;
}

.font-name {
  text-align:center;
  font-size:12px;
  color:#666;
}

.preview-box {
  display:block;
  margin:auto;
  width:fit-content;
  max-width:90%;
  box-sizing:border-box;
  white-space:pre-wrap;
  line-height:1.4;
}

/* BUTTONS */
.btns {
  text-align:center;
  margin-top:8px;
}

button {
  padding:6px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.download { background:black;color:white; }
.copy { background:#007bff;color:white;margin-left:6px; }

/* MOBILE */
@media (max-width:600px){
  textarea { height:70px; }
}
</style>
</head>

<body>

<div class="container">

<h2>🇮🇳 EZMalayalam</h2>

<textarea id="text" placeholder="Type Manglish or Malayalam..."></textarea>

<div class="controls">

<div>
<label>Text</label>
<input type="color" id="textColor" value="#ffffff">
</div>

<div>
<label>Stroke</label>
<input type="checkbox" id="strokeToggle">
<input type="color" id="strokeColor" value="#000000">
</div>

<div>
<label>Shadow</label>
<input type="checkbox" id="shadowToggle" checked>
</div>

<div>
<label>Background</label>
<input type="checkbox" id="bgToggle" checked>
<input type="color" id="bgColor" value="#000000">
</div>

<div>
<label>Size</label>
<input type="range" id="size" min="20" max="80" value="40">
</div>

<div>
<label>Padding</label>
<input type="range" id="padding" min="10" max="60" value="20">
</div>

<div>
<label>Radius</label>
<input type="range" id="radius" min="0" max="50" value="15">
</div>

<div>
<label>Align</label>
<select id="align">
<option value="center">Center</option>
<option value="left">Left</option>
<option value="right">Right</option>
</select>
</div>

</div>

<div id="preview" class="preview-container"></div>

</div>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>
/* 🔥 TRANSLITERATION */
google.load("elements", "1", { packages: "transliteration" });

function onLoad() {
  var options = {
    sourceLanguage: 'en',
    destinationLanguage: ['ml'],
    shortcutKey: 'ctrl+g',
    transliterationEnabled: true
  };

  var control = new google.elements.transliteration.TransliterationControl(options);
  control.makeTransliteratable(['text']);
}

google.setOnLoadCallback(onLoad);

/* FONTS */
const fonts = [
"Manjari",
"Gayathri",
"Chilanka",
"Baloo Chettan 2"
];

const preview = document.getElementById("preview");

/* LISTENERS */
document.querySelectorAll("input, textarea, select").forEach(el=>{
  el.addEventListener("input", render);
});

/* RENDER */
function render(){

  preview.innerHTML="";

  const text = document.getElementById("text").value || "Type something";

  const color = document.getElementById("textColor").value;
  const strokeColor = document.getElementById("strokeColor").value;
  const strokeOn = document.getElementById("strokeToggle").checked;
  const shadowOn = document.getElementById("shadowToggle").checked;
  const bgOn = document.getElementById("bgToggle").checked;
  const bgColor = document.getElementById("bgColor").value;

  const size = document.getElementById("size").value;
  const padding = document.getElementById("padding").value;
  const radius = document.getElementById("radius").value;
  const align = document.getElementById("align").value;

  fonts.forEach(font=>{

    const block = document.createElement("div");

    block.innerHTML = `
      <div class="font-name">${font}</div>

      <div id="box-${font}" class="preview-box"
      style="
        font-family:'${font}', sans-serif;
        color:${color};
        font-size:${size}px;
        padding:${padding}px;
        border-radius:${radius}px;
        background:${bgOn?bgColor:'transparent'};
        text-align:${align};
        -webkit-text-stroke:${strokeOn?2:0}px ${strokeColor};
        text-shadow:${shadowOn?'2px 2px 4px rgba(0,0,0,0.5)':'none'};
      ">
${text}
      </div>

      <div class="btns">
        <button class="download" onclick="download('${font}')">Download</button>
        <button class="copy" onclick="copyText()">Copy Text</button>
      </div>
    `;

    preview.appendChild(block);
  });
}

/* COPY */
function copyText(){
  navigator.clipboard.writeText(document.getElementById("text").value);
}

/* DOWNLOAD */
function download(font){
  html2canvas(document.getElementById("box-"+font)).then(canvas=>{
    const link=document.createElement("a");
    link.download="malayalam.png";
    link.href=canvas.toDataURL();
    link.click();
  });
}

/* INIT */
render();
</script>

</body>
</html>
