<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<title>EZMalayalam Pro Editor</title><style>

@font-face { font-family: 'Manjari'; src: url('fonts/Manjari-Regular.ttf'); }
@font-face { font-family: 'Gayathri'; src: url('fonts/Gayathri-Regular.ttf'); }
@font-face { font-family: 'Chilanka'; src: url('fonts/Chilanka-Regular.ttf'); }
@font-face { font-family: 'Baloo'; src: url('fonts/BalooChettan2-Regular.ttf'); }
@font-face { font-family: 'NotoSans'; src: url('fonts/NotoSansMalayalam-Regular.ttf'); }
@font-face { font-family: 'NotoSerif'; src: url('fonts/NotoSerifMalayalam-Regular.ttf'); }
@font-face { font-family: 'Anek'; src: url('fonts/AnekMalayalam-Regular.ttf'); }
@font-face { font-family: 'Arima'; src: url('fonts/Arima-Regular.ttf'); }

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
padding:20px;
}

textarea{
width:90%;
height:80px;
font-size:18px;
margin-bottom:10px;
padding:10px;
}

.controls{
background:#fff;
padding:15px;
border-radius:10px;
margin:10px auto;
width:90%;
}

.preview{
margin-top:20px;
}

.subtitle-box{
display:block;
margin:20px auto;
width:fit-content;
}

.subtitle-text{
display:inline-block;
white-space:pre-wrap;
text-align:center;
margin:0 auto;
}

.font-label{
font-size:13px;
margin-bottom:5px;
color:#555;
}

button{
margin-top:5px;
padding:6px 12px;
cursor:pointer;
}

</style></head><body><h2>EZMalayalam</h2><textarea id="input" placeholder="Type Manglish..."></textarea><div class="controls"><b>Text</b><br>
<input type="color" id="color" value="#ffffff">

<br><br>

<b>Stroke</b><br>
<input type="checkbox" id="strokeToggle" checked> ON
<input type="range" id="stroke" min="0" max="6" value="2">
<input type="color" id="strokeColor" value="#000000">

<br><br>

<b>Shadow</b><br>
<input type="checkbox" id="shadowToggle" checked> ON
<input type="range" id="shadow" min="0" max="10" value="3">

<br><br>

<b>Background</b><br>
<input type="checkbox" id="bgToggle" checked> ON
<input type="color" id="bgColor" value="#000000">
<input type="range" id="opacity" min="0" max="1" step="0.1" value="0.6">

<br><br>

Size <input type="range" id="size" min="40" max="120" value="70">
Padding <input type="range" id="padding" min="0" max="40" value="15">
Radius <input type="range" id="radius" min="0" max="40" value="15">

</div><div class="preview" id="preview"></div><script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script><script>

let lastText="";

const fonts=[
"Manjari",
"Gayathri",
"Chilanka",
"Baloo",
"NotoSans",
"NotoSerif",
"Anek",
"Arima"
];

document.getElementById("input").addEventListener("input",convert);

/* ✅ FIXED LINE BREAK LOGIC */
async function convert(){

let val=document.getElementById("input").value;

if(!val){
lastText="";
render();
return;
}

/* SPLIT LINES */
let lines=val.split("\n");
let convertedLines=[];

for(let line of lines){

if(line.trim()===""){
convertedLines.push("");
continue;
}

const res=await fetch(`https://inputtools.google.com/request?text=${line}&itc=ml-t-i0-und&num=1`);
const data=await res.json();

convertedLines.push(data[1][0][1][0]);
}

/* JOIN WITH LINE BREAK */
lastText=convertedLines.join("<br>");

render();
}

function render(){

let container=document.getElementById("preview");
container.innerHTML="";

if(!lastText) return;

let color=document.getElementById("color").value;

let strokeToggle=document.getElementById("strokeToggle").checked;
let stroke=document.getElementById("stroke").value;
let strokeColor=document.getElementById("strokeColor").value;

let shadowToggle=document.getElementById("shadowToggle").checked;
let shadow=document.getElementById("shadow").value;

let bgToggle=document.getElementById("bgToggle").checked;
let bgColor=document.getElementById("bgColor").value;
let opacity=document.getElementById("opacity").value;

let size=document.getElementById("size").value;
let padding=document.getElementById("padding").value;
let radius=document.getElementById("radius").value;

fonts.forEach(font=>{

let box=document.createElement("div");
box.className="subtitle-box";

/* ✅ FONT NAME BACK */
let label=document.createElement("div");
label.className="font-label";
label.innerText=font;

let textDiv=document.createElement("div");
textDiv.className="subtitle-text";

textDiv.innerHTML=lastText;

textDiv.style.fontFamily=font;
textDiv.style.fontSize=size+"px";
textDiv.style.color=color;

/* STROKE */
if(strokeToggle){
textDiv.style.webkitTextStroke=stroke+"px "+strokeColor;
}else{
textDiv.style.webkitTextStroke="0px transparent";
}

/* SHADOW */
if(shadowToggle){
textDiv.style.textShadow=`${shadow}px ${shadow}px ${shadow}px rgba(0,0,0,0.6)`;
}else{
textDiv.style.textShadow="none";
}

/* BACKGROUND */
if(bgToggle){
textDiv.style.background=`rgba(${hexToRgb(bgColor)},${opacity})`;
textDiv.style.padding=padding+"px";
textDiv.style.borderRadius=radius+"px";
}else{
textDiv.style.background="transparent";
textDiv.style.padding="0px";
}

let btn=document.createElement("button");
btn.innerText="Download";

btn.onclick=()=>{
html2canvas(textDiv,{
backgroundColor:null,
scale:3
}).then(canvas=>{
let link=document.createElement("a");
link.download=font+".png";
link.href=canvas.toDataURL();
link.click();
});
};

box.appendChild(label);
box.appendChild(textDiv);
box.appendChild(document.createElement("br"));
box.appendChild(btn);

container.appendChild(box);

});

}

function hexToRgb(hex){
let r=parseInt(hex.substr(1,2),16);
let g=parseInt(hex.substr(3,2),16);
let b=parseInt(hex.substr(5,2),16);
return `${r},${g},${b}`;
}

document.querySelectorAll("input").forEach(el=>{
el.addEventListener("input",render);
});

</script></body>
</html>
