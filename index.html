<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EZMalayalam Subtitle Editor</title>

<style>

/* ===== FONTS ===== */
@font-face { font-family: 'Manjari'; src: url('fonts/Manjari-Regular.ttf'); }
@font-face { font-family: 'Gayathri'; src: url('fonts/Gayathri-Regular.ttf'); }
@font-face { font-family: 'Chilanka'; src: url('fonts/Chilanka-Regular.ttf'); }
@font-face { font-family: 'Baloo'; src: url('fonts/BalooChettan2-Regular.ttf'); }
@font-face { font-family: 'NotoSans'; src: url('fonts/NotoSansMalayalam-Regular.ttf'); }
@font-face { font-family: 'NotoSerif'; src: url('fonts/NotoSerifMalayalam-Regular.ttf'); }
@font-face { font-family: 'Anek'; src: url('fonts/AnekMalayalam-Regular.ttf'); }
@font-face { font-family: 'Arima'; src: url('fonts/Arima-Regular.ttf'); }

body {
    font-family: Arial;
    background:#f5f5f5;
    text-align:center;
    padding:20px;
}

textarea {
    width:90%;
    height:100px;
    font-size:18px;
    padding:10px;
    border-radius:8px;
    margin-bottom:15px;
}

/* CONTROLS */
.controls {
    background:#fff;
    padding:15px;
    border-radius:12px;
    margin:auto;
    width:90%;
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
}

/* PREVIEW */
.preview {
    margin-top:30px;
}

/* BUTTON */
button {
    margin-top:20px;
    padding:12px 25px;
    background:#222;
    color:#fff;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

</style>
</head>

<body>

<h2>🎬 EZMalayalam Subtitle Editor</h2>

<textarea id="input" placeholder="Type Manglish... (Enter = new line)"></textarea>

<div class="controls">

<select id="font">
<option value="Manjari">Manjari</option>
<option value="Gayathri">Gayathri</option>
<option value="Chilanka">Chilanka</option>
<option value="Baloo">Baloo</option>
<option value="NotoSans">Noto Sans</option>
<option value="NotoSerif">Noto Serif</option>
<option value="Anek">Anek</option>
<option value="Arima">Arima</option>
</select>

<input type="color" id="color" value="#ffffff">
<input type="color" id="strokeColor" value="#000000">
<input type="color" id="bgColor" value="#000000">

<input type="range" id="size" min="40" max="150" value="80">
<input type="range" id="stroke" min="0" max="6" value="2">
<input type="range" id="shadow" min="0" max="10" value="4">
<input type="range" id="padding" min="5" max="40" value="12">
<input type="range" id="radius" min="0" max="40" value="15">
<input type="range" id="opacity" min="0" max="1" step="0.1" value="0.6">

<label><input type="checkbox" id="bold">Bold</label>
<label><input type="checkbox" id="italic">Italic</label>
<label><input type="checkbox" id="transparent">Transparent</label>

</div>

<div id="preview" class="preview"></div>

<button onclick="download()">⬇ Download PNG</button>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>

let lastText = "";

/* INPUT */
document.getElementById("input").addEventListener("input", convert);

/* CONVERT (FIXED) */
async function convert() {

let val = document.getElementById("input").value;

if (!val) {
  lastText = "";
  render();
  return;
}

let lines = val.split("\n");

let promises = lines.map(async (line) => {
  if (line.trim() === "") return "";

  const res = await fetch(`https://inputtools.google.com/request?text=${line}&itc=ml-t-i0-und&num=1`);
  const data = await res.json();

  return data[1][0][1][0];
});

let results = await Promise.all(promises);

lastText = results.join("\n");

render();
}

/* RENDER */
function render(){

if (!lastText) return;

let font = document.getElementById("font").value;
let color = document.getElementById("color").value;
let size = document.getElementById("size").value;
let bold = document.getElementById("bold").checked ? "bold" : "normal";
let italic = document.getElementById("italic").checked ? "italic" : "normal";

let stroke = document.getElementById("stroke").value;
let strokeColor = document.getElementById("strokeColor").value;
let shadow = document.getElementById("shadow").value;

let bgColor = document.getElementById("bgColor").value;
let opacity = document.getElementById("opacity").value;

let padding = parseInt(document.getElementById("padding").value);
let radius = document.getElementById("radius").value;

let background = `rgba(${hexToRgb(bgColor)}, ${opacity})`;

let html = `
<div style="display:flex; justify-content:center; width:100%;">
  <div style="
    font-family:${font};
    color:${color};
    font-size:${size}px;
    font-weight:${bold};
    font-style:${italic};
    -webkit-text-stroke:${stroke}px ${strokeColor};
    text-shadow:0px 2px ${shadow}px rgba(0,0,0,0.8);
    background:${background};
    padding:${padding}px ${padding * 1.5}px;
    border-radius:${radius}px;
    max-width:700px;
    line-height:1.3;
    text-align:center;
    white-space:pre-wrap;
    word-break:break-word;
    box-sizing:border-box;
  ">
${lastText}
  </div>
</div>
`;

document.getElementById("preview").innerHTML = html;
}

/* LIVE */
document.querySelectorAll("input,select").forEach(i=>{
i.addEventListener("input",render);
});

/* HEX TO RGB */
function hexToRgb(hex){
let r = parseInt(hex.substring(1,3),16);
let g = parseInt(hex.substring(3,5),16);
let b = parseInt(hex.substring(5,7),16);
return `${r},${g},${b}`;
}

/* DOWNLOAD */
function download(){

let el = document.getElementById("preview");
let transparent = document.getElementById("transparent").checked;

html2canvas(el,{
backgroundColor: transparent ? null : "#ffffff",
scale:4
}).then(canvas=>{
let link = document.createElement("a");
link.download = "subtitle.png";
link.href = canvas.toDataURL();
link.click();
});
}

</script>

</body>
</html>
