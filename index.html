<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EZMalayalam</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@simonwep/pickr/dist/themes/classic.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/@simonwep/pickr/dist/pickr.min.js"></script>

<style>

@font-face { font-family: 'Manjari'; src: url('fonts/Manjari-Regular.ttf'); }
@font-face { font-family: 'Gayathri'; src: url('fonts/Gayathri-Regular.ttf'); }
@font-face { font-family: 'Chilanka'; src: url('fonts/Chilanka-Regular.ttf'); }
@font-face { font-family: 'Baloo'; src: url('fonts/BalooChettan2-Regular.ttf'); }
@font-face { font-family: 'NotoSans'; src: url('fonts/NotoSansMalayalam-Regular.ttf'); }
@font-face { font-family: 'NotoSerif'; src: url('fonts/NotoSerifMalayalam-Regular.ttf'); }

body {
    font-family: Arial;
    background:#f5f5f5;
    text-align:center;
    padding:20px;
}

h2 { margin-bottom:10px; }

textarea {
    width:95%;
    height:70px;
    font-size:18px;
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
}

/* CONTROLS */
.controls {
    background:#fff;
    padding:15px;
    border-radius:12px;
    margin:15px auto;
    width:95%;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.row {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:12px;
    margin-bottom:10px;
}

.group {
    background:#fafafa;
    padding:10px;
    border-radius:10px;
    min-width:150px;
}

.pcr-button {
    width:40px !important;
    height:40px !important;
    border-radius:8px !important;
}

/* PREVIEW */
.preview-block {
    margin:25px 0;
}

.preview-text {
    display:inline-block;
    white-space:pre-line;
    word-break:break-word;
}

button {
    padding:5px 10px;
    margin:5px;
    cursor:pointer;
}

</style>
</head>

<body>

<h2>EZMalayalam</h2>

<textarea id="input" placeholder="Type Manglish..."></textarea>

<div class="controls">

<div class="row">

<div class="group">
<b>Text</b><br>
<div id="colorPicker"></div>
Size <input type="range" id="size" min="40" max="150" value="80">
<br>
<label><input type="checkbox" id="bold">Bold</label>
<label><input type="checkbox" id="italic">Italic</label>
</div>

<div class="group">
<b>Stroke</b><br>
<label><input type="checkbox" id="strokeToggle" checked>On</label><br>
<div id="strokePicker"></div>
<input type="range" id="stroke" min="0" max="6" value="2">
</div>

<div class="group">
<b>Shadow</b><br>
<label><input type="checkbox" id="shadowToggle" checked>On</label><br>
<input type="range" id="shadow" min="0" max="10" value="3">
</div>

<div class="group">
<b>Background</b><br>
<label><input type="checkbox" id="bgToggle">On</label><br>
<div id="bgPicker"></div>
<select id="bgStyle">
<option value="solid">Solid</option>
<option value="transparent">Transparent</option>
</select>
Opacity <input type="range" id="opacity" min="0" max="1" step="0.1" value="0.6">
</div>

</div>

<div class="row">

<div class="group">
Padding <input type="range" id="padding" min="0" max="40" value="10">
Radius <input type="range" id="radius" min="0" max="40" value="10">
</div>

<div class="group">
MaxWidth <input type="range" id="maxWidth" min="200" max="800" value="500">
Align 
<select id="align">
<option value="center">Center</option>
<option value="left">Left</option>
<option value="right">Right</option>
</select>
</div>

</div>

</div>

<div id="previewContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>

let lastText="";
let textColor="#ffffff";
let strokeColor="#000000";
let bgColor="#000000";

/* COLOR PICKERS */
function picker(el, def, cb){
Pickr.create({
el:el,
theme:'classic',
default:def,
components:{preview:true,hue:true,interaction:{input:true}}
})
.on('change', c=>{
cb(c.toHEXA().toString());
render();
});
}

picker('#colorPicker','#ffffff',c=>textColor=c);
picker('#strokePicker','#000000',c=>strokeColor=c);
picker('#bgPicker','#000000',c=>bgColor=c);

/* INPUT */
document.getElementById("input").addEventListener("input", convert);

async function convert(){
let val=document.getElementById("input").value;
if(!val) return;

const res=await fetch(`https://inputtools.google.com/request?text=${val}&itc=ml-t-i0-und&num=1`);
const data=await res.json();

lastText=data[1][0][1][0];
render();
}

/* FONTS */
const fonts=["Manjari","Gayathri","Chilanka","Baloo","NotoSans","NotoSerif"];

/* RENDER */
function render(){

if(!lastText) return;

let container=document.getElementById("previewContainer");
container.innerHTML="";

let size=document.getElementById("size").value;
let bold=document.getElementById("bold").checked?"bold":"normal";
let italic=document.getElementById("italic").checked?"italic":"normal";

let strokeVal=document.getElementById("stroke").value;
let strokeOn=document.getElementById("strokeToggle").checked;

let shadowVal=document.getElementById("shadow").value;
let shadowOn=document.getElementById("shadowToggle").checked;

let bgOn=document.getElementById("bgToggle").checked;
let bgStyle=document.getElementById("bgStyle").value;
let opacity=document.getElementById("opacity").value;

let padding=document.getElementById("padding").value;
let radius=document.getElementById("radius").value;
let maxWidth=document.getElementById("maxWidth").value;
let align=document.getElementById("align").value;

fonts.forEach(font=>{

let bg="transparent";

if(bgOn){
if(bgStyle==="solid") bg=bgColor;
if(bgStyle==="transparent") bg=`rgba(0,0,0,${opacity})`;
}

let strokeCss=strokeOn?`-webkit-text-stroke:${strokeVal}px ${strokeColor};`:"";
let shadowCss=shadowOn?`text-shadow:${shadowVal}px ${shadowVal}px ${shadowVal}px rgba(0,0,0,0.6);`:"";

let block=document.createElement("div");
block.className="preview-block";

block.innerHTML=`
<div style="display:flex; justify-content:center;">
    <div class="preview-text" style="
        font-family:${font};
        color:${textColor};
        font-size:${size}px;
        font-weight:${bold};
        font-style:${italic};
        ${strokeCss}
        ${shadowCss}
        background:${bg};
        padding:${padding}px;
        border-radius:${radius}px;
        max-width:${maxWidth}px;
        line-height:1.4;
        text-align:${align};
        margin:0 auto;
    ">
    ${lastText}
    </div>
</div>

<br>
<button onclick="download(this)">Download</button>
`;

container.appendChild(block);

});

}

document.querySelectorAll("input,select").forEach(i=>{
i.addEventListener("input",render);
});

/* DOWNLOAD */
function download(btn){
let el=btn.parentElement.querySelector(".preview-text");

html2canvas(el,{
backgroundColor:null,
scale:4,
useCORS:true
}).then(canvas=>{
let link=document.createElement("a");
link.download="subtitle.png";
link.href=canvas.toDataURL();
link.click();
});
}

</script>

</body>
</html>
